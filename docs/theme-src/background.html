<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="font.css">
<style>
  html,body { margin:0; padding:0; background:#060504; }
  #stage {
    position:relative; width:1920px; height:1080px; overflow:hidden;
    background:#060504; font-family:"VT323",monospace;
  }
  #maze {
    position:absolute; inset:-10px; color:#ffd257; opacity:.28;
    font-size:26px; line-height:30px; letter-spacing:12px;
    white-space:pre; text-shadow:0 0 8px rgba(255,210,87,.6);
  }
  #vig {
    position:absolute; inset:0;
    background:
      radial-gradient(ellipse 1150px 700px at 50% 42%, rgba(0,0,0,.12) 0%, rgba(0,0,0,.52) 55%, rgba(0,0,0,.82) 100%);
  }
  #scan {
    position:absolute; inset:0;
    background:repeating-linear-gradient(to bottom,
      rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px,
      rgba(0,0,0,.30) 2px, rgba(0,0,0,.30) 4px);
  }
</style></head>
<body><div id="stage">
  <div id="maze"></div>
  <div id="vig"></div>
  <div id="scan"></div>
</div>
<script>
  let s = 61250;
  const rnd = () => (s = (s * 1103515245 + 12345) & 0x7fffffff) / 0x7fffffff;
  const COLS = 60, ROWS = 38;
  let out = "";
  for (let y = 0; y < ROWS; y++) {
    for (let x = 0; x < COLS; x++) out += rnd() < .55 ? "#" : " ";
    out += "\n";
  }
  document.getElementById("maze").textContent = out;
</script>
</body></html>
